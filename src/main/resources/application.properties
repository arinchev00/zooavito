# spring.application.name=zooavito
server.port=8081

# ===== DATABASE =====
spring.datasource.url=jdbc:postgresql://localhost:5432/zooavito
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA/HIBERNATE =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== MULTIPART =====
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.location=/tmp
spring.servlet.multipart.resolve-lazily=true

# ===== SWAGGER/OPENAPI =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.csrf.enabled=false
springdoc.show-actuator=false

# ===== JWT =====
app.jwt.secret=36763979244226452948404D635166546A576D5A7134743777217A25432A462D
app.jwt.expiration=86400000

# ===== ??????????? =====
logging.level.org.springframework.security=DEBUG
logging.level.com.example.zooavito=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===== ????????? =====
spring.messages.basename=validation
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.messages.always-use-message-format=true
spring.messages.use-code-as-default-message=true