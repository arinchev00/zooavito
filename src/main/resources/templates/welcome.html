<!DOCTYPE html>
<html lang="en"
      xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css"/>
  <title>Добро пожаловать</title>
  <style>
    /* Выравнивание текста по левому краю */
    .container {
        text-align: left;
    }

    /* Выравнивание заголовков по левому краю */
    h1, h2 {
        text-align: left;
    }

    /* Выравнивание текстового меню по центру */
    .text-menu {
        text-align: center;
        margin-top: 30px;
    }

    /* Стили для кнопки выхода */
    .logout-btn {
        background-color: #dc3545;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        margin-top: 10px;
    }

    .logout-btn:hover {
        background-color: #c82333;
        text-decoration: none;
        color: white;
    }

    /* Скрытая форма для выхода */
    #logoutForm {
        display: none;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="row py-2">
    <div class="col-12">
      <h1>ZooAvito</h1>
    </div>

    <!-- Используем sec:authorize для проверки аутентификации -->
    <div class="col-12" sec:authorize="isAuthenticated()">
      <!-- Скрытая форма для выхода -->
      <form id="logoutForm" method="post" th:action="@{/logout}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      </form>

      <div class="alert alert-success mt-3" role="alert">
        <h2>Добро пожаловать, <span sec:authentication="name"></span>!</h2>
        <p class="mb-0">Вы успешно вошли в систему.</p>

        <!-- Отдельная кнопка выхода -->
        <button class="logout-btn mt-3" onclick="document.getElementById('logoutForm').submit()">
          <i class="fas fa-sign-out-alt"></i> Выйти
        </button>
      </div>

      <div class="mt-4">
        <h3>Доступные действия</h3>
        <ul>
          <li><a href="/api/menu/all">Просмотреть список пользователей</a></li>
          <li><a href="/api/menu/create">Просмотреть список объявлений</a></li>
          <li sec:authorize="hasRole('ADMIN')"><a href="/admin">Административная панель</a></li>
        </ul>
      </div>
    </div>

    <!-- Для неавторизованных пользователей -->
    <div class="col-12" sec:authorize="!isAuthenticated()">
      <div class="alert alert-warning mt-3">
        <h3>Вы не авторизованы</h3>
        <p>Пожалуйста, <a href="/login">войдите в систему</a> или
          <a href="/registration">зарегистрируйтесь</a> для доступа к функциям приложения.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
